<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitLinux Blog</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.posts{
max-width:900px;
margin:40px auto;
display:grid;
grid-template-columns:1fr;
gap:25px;
padding:0 20px;
}

.post-card{
background:white;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
border-radius:8px;
}

.post-card img{
width:100%;
border-radius:6px;
}

.post-card h2{
margin:15px 0 10px 0;
}

.post-card p{
color:#555;
}

.read-more{
display:inline-block;
margin-top:10px;
text-decoration:none;
color:#2563eb;
font-weight:bold;
}

</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8301795085751978"
     crossorigin="anonymous"></script>
</head>

<body>

<header>
<h1>BitLinux Blog</h1>
<p>Programming, Linux & Technology</p>
</header>

<div class="posts" id="postsContainer"></div>

<script src="Js/navbar.js"></script>
<script src="Js/posts.js"></script>

<script>

const container = document.getElementById("postsContainer");

posts.forEach(post => {

let preview = post.content.replace(/<[^>]*>?/gm, "");
preview = preview.substring(0,180) + "...";

container.innerHTML += `
<div class="post-card">

<img src="${post.image}" alt="${post.title}">

<h2>${post.title}</h2>

<p>${preview}</p>

<a class="read-more" href="post.html?id=${post.id}">
Read Full Article →
</a>

</div>
`;

});

</script>

</body>
  </html>
