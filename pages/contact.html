<!-- Font Awesome for social icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  margin:0; padding:0;
  background:#f0f4f8;
  color:#333;
}
nav {
  background:#2563eb;
  color:white;

nav h1 { margin:0; font-size:24px; }
.container {
  text-align:center;
  padding:60px 10%;
}
h2 { color:#2563eb; margin-bottom:20px; }
form {
  background:white;
  max-width:500px;
  margin:auto;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  gap:15px;
}
form input, form textarea {
  padding:12px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;

form button {
  background:#2563eb;
  color:white;
  border:none;

  font-size:16px;

  gap:30px;
}
.socials a {

  color:#2563eb;
