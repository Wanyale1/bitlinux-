<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | BitLinux</title>
  <link rel="stylesheet" href="styles/contact.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <h1>BitLinux</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="HTML/doc.html">Docs</a></li>
      <li><a href="HTML/pricing.html">Pricing</a></li>
      <li><a href="HTML/contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <header class="contact-header">
    <h2>Get in Touch</h2>
    <p>Have questions? Our team is ready to help you with your web hosting needs.</p>
  </header>

  <!-- CONTACT FORM -->
  <section class="contact-section">
    <form class="contact-form">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="Your email address" required>

      <label for="subject">Subject</label>
      <input type="text" id="subject" placeholder="Subject" required>

      <label for="message">Message</label>
      <textarea id="message" rows="6" placeholder="Write your message here..." required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <h3>Contact Info</h3>
      <p><i class="fas fa-map-marker-alt"></i> 123 Hosting Lane, WebCity</p>
      <p><i class="fas fa-phone"></i> +256 700 123 456</p>
      <p><i class="fas fa-envelope"></i> support@bitlinux.com</p>
      <p><i class="fas fa-globe"></i> www.bitlinux.com</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 BitLinux | Your trusted web hosting partner</p>
  </footer>

</body>
  </html>
